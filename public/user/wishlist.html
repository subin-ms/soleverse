<!DOCTYPE html>
<html lang="en">

<head>
    <script src="js/user-protected.js"></script>
    <script src="user-guard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - Soleverse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="footer.css">

    <style>
        /* RESET & VARIABLES */
        :root {
            --primary-black: #000000;
            --primary-white: #ffffff;
            --text-grey: #757575;
            --border-color: #e5e5e5;
            --bg-light: #f9f9f9;
            --font-main: 'Inter', sans-serif;
            --container-width: 1170px;
            /* Closest to screenshot width */
            --padding-x: 20px;
            --accent-red: #db4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            color: var(--primary-black);
            background-color: var(--primary-white);
            line-height: 1.5;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
            transition: 0.3s;
        }

        ul {
            list-style: none;
        }

        img {
            max-width: 100%;
            display: block;
        }

        button {
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
        }

        .container {
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 0 var(--padding-x);
        }

        /* Header CSS removed to use header.css */

        /* Wishlist Active State */
        .icon-wishlist-active {
            color: var(--accent-red);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            width: 32px;
            height: 32px;
        }

        .icon-wishlist-active i {
            font-weight: 900;
            /* Solid heart */
        }

        .mobile-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        /* Wishlist Count Badge */
        .icon-item {
            position: relative;
        }

        .badge-count {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-red);
            color: white;
            font-size: 10px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 400;
            /* Lighter font as per screenshot */
        }


        /* 3. WISHLIST SECTION */
        .wishlist-wrapper {
            margin-top: 80px;
            margin-bottom: 140px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 400;
            /* Regular weight as per screenshot */
        }

        .section-title-just-for-you {
            font-size: 20px;
            font-weight: 400;
            position: relative;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .section-title-just-for-you::before {
            content: '';
            display: block;
            width: 20px;
            height: 40px;
            background-color: var(--accent-red);
            border-radius: 4px;
            margin-left: -4px; /* Slight nudge to align visually with card edge */
        }

        .btn-outline {
            border: 1px solid rgba(0, 0, 0, 0.5);
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 500;
            background: transparent;
            border-radius: 4px;
            transition: 0.3s;
        }

        .btn-outline:hover {
            background: #f5f5f5;
        }

        /* CARD GRID */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 30px;
        }

        /* PRODUCT CARD */
        .product-card {
            position: relative;
            background: transparent;
        }

        .card-image {
            width: 100%;
            aspect-ratio: 1;
            /* Square */
            background-color: #f5f5f5;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .card-image img {
            mix-blend-mode: multiply;
            /* Helps integrate images with background */
            max-width: 80%;
            max-height: 80%;
        }

        .card-actions-top {
            position: absolute;
            top: 12px;
            right: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .icon-action {
            width: 34px;
            height: 34px;
            background: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            color: #000;
            /* Default black */
        }

        .icon-action:hover {
            color: var(--accent-red);
            /* Red on hover */
            background: #fff;
            /* Keep white bg */
        }

        .add-to-cart-btn {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            background: #000;
            color: #fff;
            border: none;
            height: 48px; /* Fixed height for perfect centering */
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transform: translateY(100%);
            /* Hidden by default */
            transition: transform 0.3s ease-in-out;
            text-transform: uppercase;
            line-height: 1;
        }

        .add-to-cart-btn i {
            font-size: 16px;
            margin-top: -2px; /* Micro-adjustment for icon baseline */
        }

        .card-image:hover .add-to-cart-btn {
            transform: translateY(0);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .product-name {
            font-size: 16px;
            font-weight: 500;
            white-space: normal !important; /* Override style.css truncation */
            min-height: 48px; /* Ensure 2-line consistency */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-price {
            font-size: 16px;
            font-weight: 500;
            color: var(--accent-red);
        }

        .price-section {
            display: flex;
            gap: 12px;
        }

        .old-price {
            color: var(--text-grey);
            text-decoration: line-through;
            font-weight: 400;
        }

        .rating-box {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #FFAD33;
            /* Use orange star color */
        }

        .review-count {
            color: rgba(0, 0, 0, 0.5);
            font-weight: 600;
        }


        /* 4. JUST FOR YOU SECTION */
        .just-for-you-wrapper {
            margin-bottom: 140px;
        }

        /* DISCOUNT BADGE */
        .discount-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--accent-red);
            color: #fff;
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
        }

        .new-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: #00FF66;
            /* Bright Green */
            color: #FAFAFA;
            /* Actually white text usually */
            color: #fff;
            background: #00D348;
            /* Adjust to match screenshot usually green */
            padding: 4px 12px;
            font-size: 12px;
            border-radius: 4px;
        }


        /* 5. FOOTER */
        footer {
            background: #000;
            color: #fff;
            padding: 80px 0 24px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1fr 1fr 1.2fr;
            gap: 87px;
            /* Matches Figma/Screenshot spacing roughly */
            margin-bottom: 60px;
        }

        .f-col h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .f-col h4 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .f-col ul li {
            margin-bottom: 16px;
            font-size: 16px;
            color: #FAFAFA;
        }

        .footer-sub-text {
            font-size: 16px;
            margin-bottom: 16px;
        }

        .subscribe-input {
            position: relative;
            margin-top: 16px;
            border: 1.5px solid #fff;
            border-radius: 4px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
        }

        .subscribe-input input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            width: 80%;
        }

        .subscribe-input i {
            font-size: 20px;
            cursor: pointer;
        }

        .app-download {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .qr-code {
            width: 80px;
            height: 80px;
            border: 2px solid white;
            padding: 2px;
        }

        .qr-code img {
            width: 100%;
            height: 100%;
        }

        .store-btns {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .store-btns img {
            height: 30px;
            /* Reduced to match layout */
            width: auto;
        }

        .footer-bottom {
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 16px;
            text-align: center;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            /* Faded copyright */
        }

        .social-links {
            display: flex;
            gap: 24px;
            margin-top: 24px;
        }

        .social-links a {
            font-size: 24px;
        }


        /* RESPONSIVE BREAKPOINTS */

        /* Tablet: 768px – 1199px */
        @media (max-width: 1199px) {
            .container {
                max-width: 100%;
                padding: 0 40px;
            }

            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .nav-menu {
                gap: 20px;
            }

            .search-box {
                width: 200px;
            }

            .footer-grid {
                grid-template-columns: 1fr 1fr;
                gap: 40px;
            }
        }

        /* Mobile: ≤767px */
        @media (max-width: 767px) {
            body {
                overflow-x: hidden;
            }

            .container {
                padding: 0 16px !important;
            }

            .wishlist-wrapper {
                margin-top: 20px !important;
                margin-bottom: 60px !important;
            }



            /* Content Grid & Layout */
            .card-grid {
                grid-template-columns: 1fr !important;
                gap: 20px !important;
            }

            .product-card {
                padding-bottom: 20px;
                border-bottom: 1px solid #f0f0f0;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
                margin-bottom: 30px;
            }

            .btn-outline {
                width: 100%;
                text-align: center;
                padding: 12px 0;
            }

            /* Footer Mobile Optimization - Force Compactness */
            footer {
                padding: 30px 0 20px !important;
                /* Reduced top padding significantly */
                text-align: center !important;
            }

            .footer-grid {
                grid-template-columns: 1fr !important;
                gap: 30px !important;
                margin-bottom: 30px !important;
                display: flex !important;
                flex-direction: column;
            }

            .f-col {
                display: flex;
                flex-direction: column;
                align-items: center;
                margin-bottom: 20px;
            }

            .f-col:last-child {
                margin-bottom: 0;
            }

            .f-col h3,
            .f-col h4 {
                margin-bottom: 12px !important;
                font-size: 18px !important;
            }

            .f-col ul li {
                margin-bottom: 8px !important;
            }

            .subscribe-input {
                width: 100% !important;
                max-width: 300px;
                margin: 0 auto;
            }

            .app-download {
                justify-content: center !important;
            }

            .social-links {
                justify-content: center !important;
                margin-top: 15px !important;
            }
        }
    </style>
</head>

<body>

    <!-- 1. TOP ANNOUNCEMENT BAR -->
    <div id="global-header"></div>

    <!-- 3. MAIN WISHLIST CONTENT -->
    <div class="main-content">
        <div class="container wishlist-wrapper">
            <div class="section-header">
                <h2 class="section-title">Wishlist</h2>
            </div>

            <div class="wishlist-grid" id="wishlistGrid">
                <!-- Dynamic Content -->
            </div>
        </div>

        <!-- 4. JUST FOR YOU SECTION -->
        <div class="container just-for-you-wrapper">
            <div class="section-header">
                <h2 class="section-title-just-for-you">Related Items</h2>
                <button class="btn-outline" onclick="window.location.href='shop.html'">See All</button>
            </div>

            <div class="wishlist-grid" id="recommendationsGrid">
                <!-- Dynamic recommendations will be loaded here -->
            </div>
        </div>
    </div>


    <div id="footer-placeholder"></div>

    <script src="wishlist.js"></script>
    <script src="products.js"></script>
    <script src="cart.js"></script>
    <script src="auth.js"></script>
    <script src="footer.js"></script>
    <script src="header.js" defer></script>
</body>

</html>
