<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Soleverse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="split-layout">
        <!-- 🎨 LEFT SIDE (DESIGN) -->
        <div class="split-left">
            <div class="blob shape-olive"></div>
            <div class="blob shape-beige"></div>
            <div class="blob shape-brown"></div>
            <div class="logo-center">Soleverse</div>
        </div>

        <!-- 🧾 RIGHT SIDE (FORM) -->
        <div class="split-right">
            <div class="form-container">
                <h1>Create New Password</h1>
                <p>Enter your new password below</p>

                <form id="resetForm">
                    <div class="form-group">
                        <input type="password" class="form-input" placeholder="New Password" required minlength="8">
                    </div>
                    <div class="form-group">
                        <input type="password" class="form-input" placeholder="Confirm Password" required minlength="8">
                    </div>

                    <button type="submit" class="btn-submit">Reset Password</button>

                    <div class="form-footer" style="margin-top: 20px;">
                        <a href="login.html" class="link-bold"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const resetForm = document.getElementById("resetForm");

            if (!resetForm) {
                console.error("Reset form not found");
                return;
            }

            resetForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const inputs = resetForm.querySelectorAll(".form-input");
                const newPassword = inputs[0].value.trim();
                const confirmPassword = inputs[1].value.trim();

                // 🔐 Get stored email
                const email = sessionStorage.getItem("resetEmail");

                // ❌ If user directly opens reset page
                if (!email) {
                    Swal.fire({
                        icon: "error",
                        title: "Session Expired",
                        text: "Please request password reset again"
                    }).then(() => {
                        window.location.href = "forgot-password.html";
                    });
                    return;
                }

                // Validation
                if (!newPassword || !confirmPassword) {
                    Swal.fire("Error", "All fields are required", "error");
                    return;
                }

                if (newPassword.length < 8) {
                    Swal.fire("Error", "Password must be at least 8 characters", "error");
                    return;
                }

                if (newPassword !== confirmPassword) {
                    Swal.fire("Error", "Passwords do not match", "error");
                    return;
                }

                const submitBtn = document.querySelector(".btn-submit");
                submitBtn.disabled = true;
                submitBtn.innerText = "Processing...";

                try {
                    // 🔁 RESET PASSWORD API
                    const res = await fetch("http://localhost:5000/api/auth/reset-password", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            email,
                            newPassword   // backend-friendly key
                        })
                    });

                    console.log("📤 Sending fetch request to reset-password with:", { email, newPasswordLength: newPassword.length });

                    const data = await res.json();
                    
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Password";

                    if (!res.ok) {
                        Swal.fire("Error", data.message || "Failed to reset password", "error");
                        return;
                    }

                    // Clear session after success
                    sessionStorage.removeItem("resetEmail");

                    Swal.fire({
                        icon: "success",
                        title: "Password Updated",
                        text: "You can now login"
                    }).then(() => {
                        window.location.href = "login.html";
                        window.history.replaceState(null, null, "login.html");
                    });

                } catch (err) {
                    Swal.fire("Error", "Server not reachable", "error");
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Reset Password";
                }
            });
        });
    </script>
</body>
</html>
