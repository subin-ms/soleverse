<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Soleverse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="auth.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <div class="split-layout">
        <!-- 🎨 LEFT SIDE (DESIGN) -->
        <div class="split-left">
            <div class="blob shape-olive"></div>
            <div class="blob shape-beige"></div>
            <div class="blob shape-brown"></div>
            <div class="logo-center">Soleverse</div>
        </div>

        <!-- 🧾 RIGHT SIDE (FORM) -->
        <div class="split-right">
            <div class="form-container">
                <h1>Reset Password</h1>
                <p>Enter your email address</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Email or Phone Number" required>
                    </div>

                    <button type="submit" class="btn-submit">Send Reset Link</button>
                    
                    <div class="form-footer" style="margin-top: 20px;">
                        <a href="login.html" class="link-bold"><i class="fas fa-arrow-left"></i> Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById("forgotForm");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.querySelector(".form-input").value.trim();
            const submitBtn = document.querySelector(".btn-submit");

            if (!email) {
                Swal.fire("Error", "Enter your email", "error");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";

            try {
                // 🔹 STEP 1: SEND OTP
                const res = await fetch("http://localhost:5000/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                const data = await res.json();
                
                submitBtn.disabled = false;
                submitBtn.innerText = "Send Reset Link";

                if (!res.ok) {
                    Swal.fire("Error", data.message || "Failed to send OTP", "error");
                    return;
                }

                // 🔹 STEP 2: OTP INPUT SWEETALERT
                Swal.fire({
                    title: "Verify OTP",
                    text: "Enter the 6-digit OTP sent to your email",
                    input: "text",
                    inputPlaceholder: "Enter OTP",
                    inputAttributes: {
                        maxlength: 6,
                        autocapitalize: "off",
                        autocorrect: "off"
                    },
                    confirmButtonText: "Verify",
                    allowOutsideClick: false,
                    preConfirm: async (otp) => {
                        if (!otp || otp.length !== 6) {
                            Swal.showValidationMessage("Please enter a valid 6-digit OTP");
                            return false;
                        }

                        try {
                            // 🔹 STEP 3: VERIFY OTP
                            const verifyRes = await fetch(
                                "http://localhost:5000/api/auth/verify-forgot-otp",
                                {
                                    method: "POST",
                                    headers: { "Content-Type": "application/json" },
                                    body: JSON.stringify({ email, otp })
                                }
                            );

                            const verifyData = await verifyRes.json();

                            if (!verifyRes.ok) {
                                Swal.showValidationMessage(
                                    verifyData.message || "Invalid OTP"
                                );
                                return false;
                            }

                            return true;

                        } catch (err) {
                            Swal.showValidationMessage("Server error");
                            return false;
                        }
                    }
                }).then((result) => {
                    if (result.isConfirmed) {
                        // ✅ STORE EMAIL FOR RESET PAGE
                        sessionStorage.setItem("resetEmail", email);

                        // ✅ REDIRECT TO RESET PASSWORD PAGE
                        window.location.href = "reset-password.html";
                    }
                });

            } catch (err) {
                Swal.fire("Error", "Server not reachable", "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
