<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmation Code | Soleverse</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="header.css">
    <style>
        /* 
        GLOBAL STYLES 
        */

        /* 
        AUTH SECTION
        */
        .auth-section {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 60px;
            align-items: center;
            margin: 60px 0 140px;
        }

        .auth-image-container {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            overflow: hidden;
            background: #fff;
        }

        .auth-image-container img {
            width: 100%;
            height: auto;
            max-width: 500px;
            object-fit: contain;
        }

        .auth-form-card {
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .auth-form-card h1 {
            font-size: 36px;
            font-weight: 500;
            letter-spacing: 1.5px;
            margin-bottom: 24px;
            font-family: var(--font-main);
        }

        .auth-form-card p {
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
            color: var(--primary-black);
            opacity: 0.8;
        }

        .form-group {
            margin-bottom: 40px;
        }

        .form-input {
            width: 100%;
            border: none;
            border-bottom: 1px solid #757575;
            padding: 8px 0;
            font-size: 16px;
            outline: none;
            color: #000;
            font-family: var(--font-main);
            transition: 0.3s;
        }

        .form-input::placeholder {
            color: #757575;
            opacity: 0.7;
        }

        .form-input:focus {
            border-bottom-color: var(--accent-red);
        }

        .btn-submit {
            background-color: var(--primary-black);
            color: #fff;
            padding: 16px 48px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            text-align: center;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: auto;
            display: inline-block;
        }

        .btn-submit:hover {
            background-color: #333;
        }

        /* FOOTER REMOVED - Using global footer.css */

        /* 
        RESPONSIVE
        */
        @media (max-width: 1200px) {
            :root {
                --padding-desktop: 0 40px;
            }

            .auth-section {
                gap: 40px;
            }

            .footer-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 992px) {

            /* Tablet */
            .auth-section {
                grid-template-columns: 1fr;
                margin-top: 40px;
                gap: 60px;
            }

            .auth-image-container {
                max-width: 500px;
                margin: 0 auto;
            }

            .auth-form-card {
                max-width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .auth-form-card h1,
            .auth-form-card p {
                text-align: center;
            }

            .auth-form-card form {
                width: 100%;
                max-width: 400px;
                text-align: left;
            }

            .nav-links,
            .search-container {
                display: none;
            }

            .mobile-toggle {
                display: block;
            }

            .nav-icons {
                margin-left: auto;
                margin-right: 20px;
            }

            .nav-links.active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 80px;
                left: 0;
                width: 100%;
                background: #fff;
                padding: 20px;
                border-bottom: 1px solid #eee;
            }

            .btn-submit {
                width: 100%;
            }
        }

        @media (max-width: 768px) {

            /* Mobile */
            :root {
                --padding-desktop: 0 20px;
            }

            .top-text {
                font-size: 10px;
                width: 60%;
                white-space: normal;
            }

            .auth-section {
                margin-top: 20px;
                margin-bottom: 80px;
            }

            .footer-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .footer-input-group {
                justify-content: center;
            }

            .social-icons {
                justify-content: center;
            }
        }
    </style>
    <link rel="stylesheet" href="footer.css">
</head>

<body>

    <!-- TOP BAR -->
    <div id="global-header"></div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <!-- AUTH SECTION -->
        <div class="auth-section">
            <div class="auth-image-container">
                <img src="/img/logo.png"
                    alt="Soleverse Graphic">
            </div>

            <div class="auth-form-card">
                <h1>Confirmation Code</h1>
                <p>Enter the confirmation code</p>

                <form id="confirmForm">
                    <div class="form-group">
                        <input type="text" class="form-input" placeholder="Confirmation code" required>
                    </div>

                    <button type="submit" class="btn-submit">Submit</button>
                    <!-- Screenshot doesn't show back button, keeping it clean as per rules -->
                </form>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="footer.js"></script>
    <script src="header.js"></script>
    <script src="auth.js"></script>
</body>

</html>
