<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Verify OTP | Soleverse</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #fff;
      padding: 30px;
      width: 360px;
      border-radius: 6px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, .1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }
  </style>
    <link rel="stylesheet" href="footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <div class="card">
    <h2>Email Verification</h2>
    <p>Enter your email and OTP</p>

    <input type="email" id="email" placeholder="Enter your email">
    <input type="text" id="otp" placeholder="6-digit OTP" maxlength="6">

    <button onclick="verifyOTP()">Verify</button>
  </div>

  <script>
    async function verifyOTP() {
      const email = document.getElementById("email").value.trim();
      const otp = document.getElementById("otp").value.trim();

      if (!email || otp.length !== 6) {
        Swal.fire("Error", "Enter valid email and 6-digit OTP", "warning");
        return;
      }

      try {
        const res = await fetch("http://localhost:5000/api/auth/verify-forgot-otp", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email, otp })
        });


        const data = await res.json();

        if (!res.ok) {
          Swal.fire("Failed", data.message, "error");
          return;
        }

        Swal.fire("Success", "Email verified successfully", "success")
          .then(() => window.location.href = "login.html");

      } catch {
        Swal.fire("Server Error", "Try again later", "error");
      }
    }
  </script>

    <script src="footer.js"></script>
</body>

</html>
