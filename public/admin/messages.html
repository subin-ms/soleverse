    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary-blue: #3b82f6;
            --primary-bg: #f8f9fa;
            --white: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --border-color: #e5e7eb;
            --success-green: #10b981;
            --danger-red: #ef4444;
        }

        /* Generic Icon Style */
        svg.icon { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--primary-bg); color: var(--text-dark); height: 100vh; display: flex; overflow: hidden; }

        .main-content {
            flex: 1; display: flex; flex-direction: column; overflow-y: auto;
            position: relative; margin-left: 260px; transition: margin-left 0.3s;
        }
        @media (max-width: 1199px) { .main-content { margin-left: 0; } }

        .top-navbar {
            background-color: var(--white); padding: 1rem 2rem; display: flex; justify-content: space-between;
            align-items: center; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100;
        }
        .page-title { font-size: 1.25rem; font-weight: 700; color: #111827; display: flex; align-items: center; gap: 10px; }
        .hamburger-menu { display: none; cursor: pointer; background: none; border: none; }
        @media (max-width: 1199px) { .hamburger-menu { display: block; } }

        .content-wrapper { padding: 2rem; max-width: 1600px; margin: 0 auto; width: 100%; }

        /* Filter Section */
        .filter-bar { background: white; padding: 1.25rem 1.5rem; border-radius: 16px 16px 0 0; display: flex; gap: 1rem; border-bottom: 1px solid var(--border-color); }
        .filter-btn {
            padding: 0.5rem 1.25rem; border-radius: 50px; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; border: 1px solid var(--border-color); background: white; color: var(--text-gray); transition: all 0.2s;
        }
        .filter-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

        /* Table Area */
        .table-container { background: white; border-radius: 0 0 16px 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 1rem 1.5rem; background: #eff6ff; color: #4b5563; font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 1.25rem 1.5rem; border-bottom: 1px solid #f3f4f6; vertical-align: middle; }
        tr:hover { background-color: #f9fafb; }
        .unread-row { background-color: #f0f7ff; }

        .sender-info { display: flex; flex-direction: column; }
        .sender-name { font-weight: 700; color: #111827; }
        .sender-email { font-size: 0.8rem; color: #6b7280; }

        .subject-text { font-weight: 700; color: #111827; margin-bottom: 4px; }
        .message-excerpt { font-size: 0.85rem; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 450px; }

        .status-badge { padding: 0.4rem 0.8rem; border-radius: 50px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; display: inline-flex; }
        .status-unread { background: #dbeafe; color: #1e40af; }
        .status-read { background: #f3f4f6; color: #6b7280; }

        /* Action Buttons */
        .action-btns { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn-icon { width: 34px; height: 34px; border-radius: 8px; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .btn-view { background: #eff6ff; color: #3b82f6; }
        .btn-reply { background: #ecfdf5; color: #10b981; text-decoration: none; }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }
        .modal-container { background: white; padding: 2rem; border-radius: 16px; width: 600px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-color); }
        .modal-body { line-height: 1.6; }
        .modal-message { padding: 1.5rem; background: #f8fafc; border-radius: 12px; border: 1px solid #f1f5f9; white-space: pre-wrap; margin-top: 1rem; color: #334155; }
        .btn-modal-close { background: #f1f5f9; color: #475569; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .btn-modal-reply { background: var(--success-green); color: white; border: none; padding: 0.6rem 2rem; border-radius: 8px; font-weight: 700; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }

        /* Pagination */
        .pagination-footer { padding: 1.25rem 1.5rem; display: flex; justify-content: space-between; align-items: center; background: #fff; border-top: 1px solid var(--border-color); }
        .ctrl-btn { padding: 0.5rem 1.25rem; border-radius: 8px; border: 1px solid var(--border-color); background: white; font-weight: 600; cursor: pointer; }
        .ctrl-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>

    <main class="main-content">
        <header class="top-navbar">
            <div class="page-title">
                <button class="hamburger-menu" id="hamburger-btn">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <span>Contact Messages</span>
            </div>
        </header>

        <div class="content-wrapper">
            <div class="message-container">
                <div class="filter-bar">
                    <button class="filter-btn active" id="filterAll" onclick="filterMessages('all')">All Messages</button>
                    <button class="filter-btn" id="filterUnread" onclick="filterMessages('unread')">Unread</button>
                    <button class="filter-btn" id="filterRead" onclick="filterMessages('read')">Read</button>
                </div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Status</th>
                                <th>Sender</th>
                                <th>Subject & Preview</th>
                                <th>Date</th>
                                <th style="text-align: right;">Action</th>
                            </tr>
                        </thead>
                        <tbody id="messages-body">
                            <tr><td colspan="5" style="text-align:center; padding:3rem; color:#94a3b8;">Loading Inbox...</td></tr>
                        </tbody>
                    </table>
                    <div class="pagination-footer">
                        <div style="font-size:0.9rem; color:#64748b; font-weight:600;" id="pageInfo">Page 1 of 1</div>
                        <div style="display:flex; gap:0.5rem;">
                            <button class="ctrl-btn" id="prev-btn" onclick="changePage(-1)">Previous</button>
                            <button class="ctrl-btn" id="next-btn" onclick="changePage(1)">Next</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="messageModal">
        <div class="modal-container">
            <div class="modal-header">
                <h3 style="font-size:1.1rem; font-weight:700;">Message Preview</h3>
                <span style="font-size:1.5rem; cursor:pointer;" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <h4 id="modal-subject" style="font-size:1.2rem; font-weight:700; margin-bottom:0.5rem;"></h4>
                <div style="font-size:0.9rem; color:#64748b; margin-bottom:1.5rem;">
                    From: <strong id="modal-name" style="color:#1e293b;"></strong> (<span id="modal-email"></span>)<br>
                    Received: <span id="modal-date"></span>
                </div>
                <div class="modal-message" id="modal-content"></div>
            </div>
            <div style="display:flex; gap:1rem; margin-top:2rem; justify-content:flex-end;">
                <button class="btn-modal-close" onclick="closeModal()">Close</button>
                <a href="#" class="btn-modal-reply" id="modal-reply-btn">
                    <i class="fas fa-reply"></i> Reply via Email
                </a>
            </div>
        </div>
    </div>

    <script src="admin-sidebar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const API_BASE = "http://localhost:5000/api";
        let currentPage = 1;
        let currentStatus = 'all';
        const limit = 10;
        let messagesData = [];

        async function fetchMessages() {
            try {
                const res = await fetch(`${API_BASE}/contact/admin/all?page=${currentPage}&limit=${limit}&status=${currentStatus}`, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                if (res.status === 401 || res.status === 403) return window.location.href = '../user/login.html';
                const result = await res.json();
                if (result.success) {
                    messagesData = result.data;
                    renderMessages(result.data);
                    updatePagination(result.pagination);
                }
            } catch (error) { console.error('Inbox Sync Fail:', error); }
        }

        function renderMessages(messages) {
            const tbody = document.getElementById('messages-body');
            tbody.innerHTML = messages.length ? messages.map(msg => `
                <tr class="${!msg.isRead ? 'unread-row' : ''}">
                    <td><span class="status-badge ${msg.isRead ? 'status-read' : 'status-unread'}">${msg.isRead ? 'Read' : 'New'}</span></td>
                    <td><div class="sender-info"><span class="sender-name">${msg.name}</span><span class="sender-email">${msg.email}</span></div></td>
                    <td><div class="subject-text">${msg.subject}</div><div class="message-excerpt">${msg.message}</div></td>
                    <td><div style="font-size:0.85rem; color:#64748b; font-weight:600;">${new Date(msg.createdAt).toLocaleDateString()}</div></td>
                    <td>
                        <div class="action-btns">
                            <button class="btn-icon btn-view" onclick="viewMessage('${msg._id}')" title="Read"><i class="fas fa-eye"></i></button>
                            <a href="mailto:${msg.email}?subject=Re: ${encodeURIComponent(msg.subject)}" class="btn-icon btn-reply" title="Direct Reply"><i class="fas fa-reply"></i></a>
                        </div>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" style="text-align:center; padding:3rem; color:#9ca3af; font-weight:600;">No messages found in this folder.</td></tr>';
        }

        async function viewMessage(id) {
            const msg = messagesData.find(m => m._id === id);
            if (!msg) return;
            document.getElementById('modal-subject').innerText = msg.subject;
            document.getElementById('modal-name').innerText = msg.name;
            document.getElementById('modal-email').innerText = msg.email;
            document.getElementById('modal-date').innerText = new Date(msg.createdAt).toLocaleString();
            document.getElementById('modal-content').innerText = msg.message;
            document.getElementById('modal-reply-btn').href = `mailto:${msg.email}?subject=Re: ${encodeURIComponent(msg.subject)}`;
            document.getElementById('messageModal').classList.add('active');
            if (!msg.isRead) await markAsRead(id);
        }

        async function markAsRead(id) {
            try { await fetch(`${API_BASE}/contact/admin/${id}/read`, { method: 'PATCH', headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } }); fetchMessages(); }
            catch (err) { console.error('Mark read fail', err); }
        }

        function closeModal() { document.getElementById('messageModal').classList.remove('active'); }

        function filterMessages(status) {
            currentStatus = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if(status==='all') document.getElementById('filterAll').classList.add('active');
            if(status==='unread') document.getElementById('filterUnread').classList.add('active');
            if(status==='read') document.getElementById('filterRead').classList.add('active');
            currentPage = 1; fetchMessages();
        }

        function updatePagination(p) {
            document.getElementById('pageInfo').innerText = `Page ${p.currentPage} of ${p.totalPages || 1}`;
            document.getElementById('prev-btn').disabled = p.currentPage === 1;
            document.getElementById('next-btn').disabled = p.currentPage === p.totalPages || p.totalPages === 0;
        }

        function changePage(delta) { currentPage += delta; fetchMessages(); }
        document.addEventListener('DOMContentLoaded', fetchMessages);
    </script>
</body>
