<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary-blue: #4e73df;
            --primary-bg: #f9fafb;
            --white: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --border-color: #f3f4f6;
            --success-green: #10b981;
            --bg-success: #ecfdf5;
            --danger-red: #ef4444;
            --warning-orange: #f97316;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--primary-bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            margin-left: 260px; /* Sidebar width */
        }

        /* Header Area */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #111827;
        }

        .search-wrapper {
            position: relative;
            width: 320px;
        }

        .search-input {
            width: 100%;
            padding: 0.6rem 1rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 0.9rem;
            color: #374151;
            background-color: #fff;
            transition: all 0.2s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            width: 18px;
            height: 18px;
        }

        /* Table Card */
        .table-card {
            background: var(--white);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #f3f4f6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        th {
            text-align: left;
            padding: 1.25rem 1.5rem;
            color: #6b7280;
            font-weight: 500;
            font-size: 0.85rem;
            background-color: #fff;
            border-bottom: 1px solid #f3f4f6;
        }

        td {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid #f3f4f6;
            color: #374151;
            vertical-align: middle;
        }

        tbody tr:hover {
            background-color: #f9fafb;
        }

        /* Column Specifics */
        .td-name { font-weight: 500; color: #111827; }
        .td-email { color: #6b7280; font-size: 0.9rem; }
        .td-date { font-weight: 500; color: #111827; }
        .td-spent { font-weight: 600; color: #4e73df; }
        .td-cancellations { color: #ef4444; font-weight: 500; }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.025em;
            text-transform: uppercase;
        }

        .status-badge.active {
            background-color: #ecfdf5;
            color: #10b981;
            border: 1px solid #d1fae5;
        }

        .status-badge.blocked {
            background-color: #fef2f2;
            color: #ef4444;
            border: 1px solid #fee2e2;
        }

        /* Action Buttons */
        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #f97316; /* Orange lock */
            padding: 8px;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .action-btn:hover {
            color: #ea580c;
        }

        .icon {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
        }

        /* Loading State */
        .loading-overlay {
            display: none;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            color: var(--text-gray);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 1024px) {
            .main-content { margin-left: 0; padding: 1.5rem; }
            .sidebar { display: none; }
        }
    </style>
</head>

    <main class="main-content">
        <header class="page-header">
            <h1>Customer List</h1>
            <div class="search-wrapper">
                <input type="text" id="customerSearch" class="search-input" placeholder="Search customers...">
            </div>
        </header>

        <section class="table-card">
            <div id="loadingState" class="loading-overlay">
                <div class="spinner"></div>
                <span>Loading customers...</span>
            </div>
            
            <table id="customerTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Joined Date</th>
                        <th>Orders</th>
                        <th>Cancellations</th>
                        <th>Spent</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="customerTableBody">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        const customerSearch = document.getElementById('customerSearch');
        const customerTableBody = document.getElementById('customerTableBody');
        const loadingState = document.getElementById('loadingState');
        const customerTable = document.getElementById('customerTable');

        let searchTimeout;

        async function fetchCustomers(search = '') {
            try {
                loadingState.style.display = 'flex';
                customerTable.style.opacity = '0.5';

                const response = await fetch(`/api/customers/admin?search=${search}`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const data = await response.json();

                if (data.success) {
                    renderCustomers(data.customers);
                }
            } catch (error) {
                console.error('Error fetching customers:', error);
            } finally {
                loadingState.style.display = 'none';
                customerTable.style.opacity = '1';
            }
        }

        function renderCustomers(customers) {
            customerTableBody.innerHTML = '';
            
            if (customers.length === 0) {
                customerTableBody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 3rem; color: #6b7280;">No customers found</td></tr>';
                return;
            }

            customers.forEach(customer => {
                const date = new Date(customer.joinedDate).toLocaleDateString('en-GB'); // DD/MM/YYYY
                const spent = new Intl.NumberFormat('en-IN', {
                    style: 'currency',
                    currency: 'INR',
                    maximumFractionDigits: 2
                }).format(customer.spent);

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="td-name">${customer.name}</td>
                    <td class="td-email">${customer.email}</td>
                    <td class="td-date">${date}</td>
                    <td>${customer.orders}</td>
                    <td class="td-cancellations">${customer.cancellations}</td>
                    <td class="td-spent">${spent}</td>
                    <td><span class="status-badge ${customer.isBlocked ? 'blocked' : 'active'}">${customer.status}</span></td>
                    <td>
                        <button class="action-btn" onclick="confirmToggleBlock('${customer._id}', ${customer.isBlocked})" title="${customer.isBlocked ? 'Unblock User' : 'Block User'}" style="color: ${customer.isBlocked ? '#10b981' : '#f97316'}">
                            ${customer.isBlocked 
                                ? `<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>` 
                                : `<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`}
                        </button>
                    </td>
                `;
                customerTableBody.appendChild(row);
            });
        }

        async function confirmToggleBlock(userId, isBlocked) {
            const action = isBlocked ? 'unblock' : 'block';
            const color = isBlocked ? '#10b981' : '#ef4444';
            
            const result = await Swal.fire({
                title: `Are you sure?`,
                text: `You are about to ${action} this user account.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: color,
                cancelButtonColor: '#6b7280',
                confirmButtonText: `Yes, ${action} them!`
            });

            if (result.isConfirmed) {
                toggleBlock(userId);
            }
        }

        async function toggleBlock(userId) {
            try {
                const response = await fetch(`/api/customers/admin/${userId}/block`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('adminToken')}`
                    }
                });
                const data = await response.json();

                if (data.success) {
                    Swal.fire({
                        title: 'Updated!',
                        text: data.message,
                        icon: 'success',
                        timer: 1500,
                        showConfirmButton: false
                    });
                    fetchCustomers(customerSearch.value);
                }
            } catch (error) {
                console.error('Error toggling block:', error);
                Swal.fire('Error', 'Something went wrong', 'error');
            }
        }

        // Live Search with Debounce
        customerSearch.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchCustomers(e.target.value);
            }, 300);
        });

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        });

        // Initial Load
        fetchCustomers();
    </script>
